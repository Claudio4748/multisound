<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: https:; script-src 'self' 'unsafe-inline' https://www.youtube.com https://cdn.jsdelivr.net; frame-src https://www.youtube.com">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multi Sound</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <div>
        <h1>Multi Sound</h1>
        <div style="font-size:13px;color:rgba(230,255,247,0.8);margin-top:6px">Assegna playlist diverse a ogni uscita e riproduci simultaneamente</div>
      </div>
      <div class="controls" id="headerControls">
        <button id="refresh">🔄 Aggiorna dispositivi</button>
        <button id="enableDevices" class="secondary">🛡️ Abilita dispositivi</button>
      </div>
    </header>

    <main>
      <div id="devices" class="device-list"></div>
    </main>

    <div class="splash" id="splash">
      <div class="splash-card">
        <h2>Consenti accesso ai dispositivi</h2>
        <p>Per visualizzare e usare gli output audio, concedi l'autorizzazione. Nessun audio verrà registrato.</p>
        <div style="display:flex;gap:12px;justify-content:center">
          <button id="enableOnly">Consenti autorizzazione</button>
        </div>
      </div>
    </div>
    
    <!-- Hidden file pickers for audio selection -->
    <input id="filePicker" type="file" accept="audio/*" multiple style="display:none">
    <input id="folderPicker" type="file" webkitdirectory directory multiple accept="audio/*" style="display:none">
    
    <script src="renderer.js"></script>
  </body>
</html>
